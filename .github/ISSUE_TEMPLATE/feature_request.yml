name: Feature Request
description: Suggest a new API feature or improvement
title: "[Feature]: "
labels: ["enhancement", "needs-discussion"]
projects: []
assignees: []

body:
  - type: dropdown
    id: topic
    attributes:
      label: Topic / API Area
      options:
        - Authentication / JWT
        - Spaces API
        - Tasks API
        - Documents API
        - Notifications API
        - Matterport Integration
        - Supabase / Database
        - Performance / Caching
        - Security
        - API Documentation
        - New Area
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem should this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Desired Solution
      description: How should the endpoint / feature look?
      placeholder: |
        Endpoint: POST /api/...
        Request Body: { ... }
        Response: { ... }
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Must-have (MVP)
        - Should-have
        - Nice-to-have
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
