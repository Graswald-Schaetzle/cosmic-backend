name: Task
description: Backend development task or refactoring
title: "[Task]: "
labels: ["task"]
projects: []
assignees: []

body:
  - type: dropdown
    id: topic
    attributes:
      label: Topic / Sprint Area
      options:
        - Authentication / JWT
        - Spaces API
        - Tasks API
        - Documents API
        - Notifications API
        - Matterport Integration
        - Supabase / Database
        - Refactoring / Code Quality
        - Testing / QA
        - DevOps / CI/CD
        - Security
        - API Documentation (Swagger)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Task Description
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true
