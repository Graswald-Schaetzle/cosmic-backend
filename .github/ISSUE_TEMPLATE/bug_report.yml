name: Bug Report
description: Report a bug in the backend
title: "[Bug]: "
labels: ["bug", "triage"]
projects: []
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug!

  - type: dropdown
    id: topic
    attributes:
      label: Topic / API Area
      description: Which part of the backend is affected?
      options:
        - Authentication / JWT
        - Spaces (primary aggregate)
        - Tasks API
        - Documents API
        - Notifications API
        - Matterport Integration
        - Supabase / Database
        - Middleware / Security
        - CI/CD / Deployment
        - Swagger / API Docs
        - Other
    validations:
      required: true

  - type: input
    id: endpoint
    attributes:
      label: Affected API Endpoint
      placeholder: e.g. GET /api/spaces/:id

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Send request to '...'
        2. With body '...'
        3. Error appears
    validations:
      required: true

  - type: textarea
    id: response
    attributes:
      label: Actual Response / Error Message
      render: json
      placeholder: HTTP status code and response body

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical (production outage)
        - High (important feature broken)
        - Medium (workaround available)
        - Low (minor)
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Logs, stack traces, screenshots
