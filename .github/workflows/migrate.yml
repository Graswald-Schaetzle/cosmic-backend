name: Run Supabase Migration

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    name: Run reconstruction_jobs migration

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install postgresql-client
        run: sudo apt-get install -y postgresql-client-16

      - name: Debug connection (no password shown)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          CLEAN_URL=$(echo "$SUPABASE_DB_URL" | tr -d '[:space:]')
          echo "URL length: ${#CLEAN_URL}"
          echo "Host: $(echo $CLEAN_URL | sed 's|.*@\([^:/?]*\).*|\1|')"
          echo "User: $(echo $CLEAN_URL | sed 's|.*://\([^:]*\):.*|\1|')"
          # Check if sslmode is already in the URL
          if echo "$CLEAN_URL" | grep -q "sslmode"; then
            echo "SSL mode: already set in URL"
          else
            echo "SSL mode: will add sslmode=require"
          fi

      - name: Run migration via psql
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          PGSSLMODE: require
        run: |
          CLEAN_URL=$(echo "$SUPABASE_DB_URL" | tr -d '[:space:]')
          # Append sslmode=require if not already present
          if echo "$CLEAN_URL" | grep -q "sslmode"; then
            FINAL_URL="$CLEAN_URL"
          elif echo "$CLEAN_URL" | grep -q "?"; then
            FINAL_URL="${CLEAN_URL}&sslmode=require"
          else
            FINAL_URL="${CLEAN_URL}?sslmode=require"
          fi
          psql "$FINAL_URL" \
            -f supabase/migrations/20260309000001_reconstruction_jobs.sql \
            -v ON_ERROR_STOP=1

      - name: Verify migration
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          PGSSLMODE: require
        run: |
          CLEAN_URL=$(echo "$SUPABASE_DB_URL" | tr -d '[:space:]')
          if echo "$CLEAN_URL" | grep -q "sslmode"; then
            FINAL_URL="$CLEAN_URL"
          elif echo "$CLEAN_URL" | grep -q "?"; then
            FINAL_URL="${CLEAN_URL}&sslmode=require"
          else
            FINAL_URL="${CLEAN_URL}?sslmode=require"
          fi
          echo "=== reconstruction_jobs table ==="
          psql "$FINAL_URL" -c "\d reconstruction_jobs"
          echo "=== floors.active_reconstruction_job_id ==="
          psql "$FINAL_URL" -c "SELECT column_name, data_type FROM information_schema.columns WHERE table_name='floors' AND column_name='active_reconstruction_job_id';"
