name: Run Supabase Migration

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    name: Run reconstruction_jobs migration

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install postgresql-client
        run: sudo apt-get install -y postgresql-client-16

      - name: Run migration via psql
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          psql "$SUPABASE_DB_URL" \
            -f supabase/migrations/20260309000001_reconstruction_jobs.sql \
            -v ON_ERROR_STOP=1

      - name: Verify migration
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "=== reconstruction_jobs table ==="
          psql "$SUPABASE_DB_URL" -c "\d reconstruction_jobs"
          echo "=== floors.active_reconstruction_job_id ==="
          psql "$SUPABASE_DB_URL" -c "SELECT column_name, data_type FROM information_schema.columns WHERE table_name='floors' AND column_name='active_reconstruction_job_id';"
