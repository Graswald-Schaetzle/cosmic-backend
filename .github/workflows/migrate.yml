name: Run Supabase Migration

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    name: Run reconstruction_jobs migration

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install postgresql-client
        run: sudo apt-get install -y postgresql-client-16

      - name: Debug connection (no password shown)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          # Strip whitespace/newlines just in case
          CLEAN_URL=$(echo "$SUPABASE_DB_URL" | tr -d '[:space:]')
          # Show host+user only (mask password)
          echo "URL length: ${#CLEAN_URL}"
          echo "Host: $(echo $CLEAN_URL | sed 's|.*@\([^:/?]*\).*|\1|')"
          echo "User: $(echo $CLEAN_URL | sed 's|.*://\([^:]*\):.*|\1|')"

      - name: Run migration via psql
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          CLEAN_URL=$(echo "$SUPABASE_DB_URL" | tr -d '[:space:]')
          psql "$CLEAN_URL" \
            -f supabase/migrations/20260309000001_reconstruction_jobs.sql \
            -v ON_ERROR_STOP=1

      - name: Verify migration
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          CLEAN_URL=$(echo "$SUPABASE_DB_URL" | tr -d '[:space:]')
          echo "=== reconstruction_jobs table ==="
          psql "$CLEAN_URL" -c "\d reconstruction_jobs"
          echo "=== floors.active_reconstruction_job_id ==="
          psql "$CLEAN_URL" -c "SELECT column_name, data_type FROM information_schema.columns WHERE table_name='floors' AND column_name='active_reconstruction_job_id';"
