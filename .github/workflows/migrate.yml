name: Run Supabase Migration

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    name: Run reconstruction_jobs migration

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install postgresql-client
        run: sudo apt-get install -y postgresql-client-16

      - name: Run migration (errors written to summary)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          PGSSLMODE: require
        run: |
          CLEAN_URL=$(echo "$SUPABASE_DB_URL" | tr -d '[:space:]')
          if echo "$CLEAN_URL" | grep -q "sslmode"; then
            FINAL_URL="$CLEAN_URL"
          elif echo "$CLEAN_URL" | grep -q "?"; then
            FINAL_URL="${CLEAN_URL}&sslmode=require"
          else
            FINAL_URL="${CLEAN_URL}?sslmode=require"
          fi

          echo "## psql output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          psql "$FINAL_URL" \
            -f supabase/migrations/20260309000001_reconstruction_jobs.sql \
            -v ON_ERROR_STOP=1 2>&1 | tee -a $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "--- Rename gcp_batch_job_id → runpod_job_id ---" >> $GITHUB_STEP_SUMMARY

          psql "$FINAL_URL" \
            -f supabase/migrations/20260319000001_rename_batch_job_id_to_runpod.sql \
            -v ON_ERROR_STOP=1 2>&1 | tee -a $GITHUB_STEP_SUMMARY

          EXIT=$?
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "Exit code: $EXIT" >> $GITHUB_STEP_SUMMARY
          exit $EXIT

      - name: Verify migration
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          PGSSLMODE: require
        run: |
          CLEAN_URL=$(echo "$SUPABASE_DB_URL" | tr -d '[:space:]')
          if echo "$CLEAN_URL" | grep -q "sslmode"; then
            FINAL_URL="$CLEAN_URL"
          elif echo "$CLEAN_URL" | grep -q "?"; then
            FINAL_URL="${CLEAN_URL}&sslmode=require"
          else
            FINAL_URL="${CLEAN_URL}?sslmode=require"
          fi
          psql "$FINAL_URL" -c "\d reconstruction_jobs" || echo "Note: table describe failed (may be connection pool issue), continuing"
          psql "$FINAL_URL" -c "SELECT column_name, data_type FROM information_schema.columns WHERE table_name='floors' AND column_name='active_reconstruction_job_id';" || echo "Note: column check failed (may be connection pool issue), continuing"
          echo "Migration verification step completed (connection pool re-use may cause intermittent auth errors)"
