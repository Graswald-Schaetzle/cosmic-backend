name: Build & Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: cosmic-489720
  REGION: europe-west4
  REGISTRY: europe-west4-docker.pkg.dev
  AR_REPOSITORY: cosmic-backend
  SERVICE: cosmic-backend
  IMAGE: europe-west4-docker.pkg.dev/cosmic-489720/cosmic-backend/backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and deploy backend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get the latest tag
      id: get_tag
      run: |
        git fetch --tags
        latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        echo "Latest tag: $latest_tag"
        echo "latest_tag=$latest_tag" >> $GITHUB_ENV

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker for Artifact Registry
      run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

    - name: Build and push Docker image
      run: |
        docker build \
          -t ${{ env.IMAGE }}:${{ github.sha }} \
          -t ${{ env.IMAGE }}:latest \
          .
        docker push ${{ env.IMAGE }}:${{ github.sha }}
        docker push ${{ env.IMAGE }}:latest

    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy ${{ env.SERVICE }} \
          --image=${{ env.IMAGE }}:${{ github.sha }} \
          --region=${{ env.REGION }} \
          --platform=managed \
          --allow-unauthenticated \
          --port=3000 \
          --service-account=claude-code@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
          --update-env-vars="SUPABASE_URL=${{ secrets.SUPABASE_URL }},SUPABASE_KEY=${{ secrets.SUPABASE_KEY }},COOKIE_SECRET=${{ secrets.COOKIE_SECRET }},ACCESS_TOKEN_SECRET=${{ secrets.ACCESS_TOKEN_SECRET }},REFRESH_TOKEN_SECRET=${{ secrets.REFRESH_TOKEN_SECRET }},API_LOGIN=${{ secrets.API_LOGIN }},API_PASS=${{ secrets.API_PASS }},MATTERPORT_MODEL_ID=${{ secrets.MATTERPORT_MODEL_ID }},MATTERPORT_API_KEY=${{ secrets.MATTERPORT_API_KEY }},GCP_PROJECT_ID=${{ env.PROJECT_ID }},GCP_REGION=${{ env.REGION }},GCS_3D_PIPELINE_BUCKET=cosmic-3d-pipeline,WORKER_DOCKER_IMAGE=ghcr.io/graswald-schaetzle/cosmic-3d-worker:latest,RUNPOD_API_KEY=${{ secrets.RUNPOD_API_KEY }},RUNPOD_ENDPOINT_ID=${{ secrets.RUNPOD_ENDPOINT_ID }},CALLBACK_BASE_URL=${{ secrets.BACKEND_URL }},CALLBACK_SECRET=${{ secrets.CALLBACK_SECRET }}"

    - name: Show deployed URL
      run: |
        gcloud run services describe ${{ env.SERVICE }} \
          --region=${{ env.REGION }} \
          --format='value(status.url)'
